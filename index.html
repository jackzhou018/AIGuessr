<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIGuessr</title>
  <link rel="stylesheet" href="styles.css?v=20260501">
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="script.js?v=20260501" defer></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">AIGuessr</p>
      <h1>Guess the AI-generated image</h1>
    </div>
  </header>

  <main>
    <section class="quiz-shell" id="game">
      <div class="game-header">
        <div>
          <p class="eyebrow">Real vs AI</p>
          <h2>Image Test</h2>
        </div>
        <p id="mediaStats" class="game-meta"></p>
      </div>

      <div class="game-status">
        <p id="roundIndicator">Round 1 of 15</p>
        <p id="scoreIndicator">Score: 0</p>
      </div>

      <p id="promptText" class="prompt"></p>

      <div id="optionsGrid" class="options-grid" aria-live="polite"></div>

      <div id="feedbackBox" class="feedback" role="status" aria-live="polite"></div>

      <div class="controls">
        <button id="nextRoundBtn" class="btn" disabled>Next Round</button>
        <button id="restartBtn" class="btn btn--ghost hidden">Play Again</button>
      </div>
    </section>
  </main>
</body>
</html>
